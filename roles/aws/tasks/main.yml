---
- name: Ensure .aws directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.aws"
    state: directory
    mode: "0755"
  tags: [aws]

- name: Symlink AWS config
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/.aws/config"
    dest: "{{ home_dir }}/.aws/config"
    state: link
    force: true
  tags: [aws]

- name: Symlink AWS profile switcher
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/.aws/switch-aws-profile.sh"
    dest: "{{ home_dir }}/.aws/switch-aws-profile.sh"
    state: link
    force: true
  tags: [aws]

- name: Symlink AWS SSO login helper
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/.aws/aws-login.zsh"
    dest: "{{ home_dir }}/.aws/aws-login.zsh"
    state: link
    force: true
  tags: [aws]
