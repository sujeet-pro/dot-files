---
# --- Claude Global Settings ---

- name: Ensure ~/.claude directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.claude"
    state: directory
    mode: "0755"
  tags: [claude, config]

- name: Symlink Claude global settings.json
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/claude/settings.json"
    dest: "{{ home_dir }}/.claude/settings.json"
    state: link
    force: true
  tags: [claude, config]

# --- Claude Skills ---

- name: Ensure ~/.claude/skills directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.claude/skills"
    state: directory
    mode: "0755"
  tags: [claude, skills]

- name: Find all skill directories in repo
  ansible.builtin.find:
    paths: "{{ dotfiles_repo }}/configs/claude/skills"
    file_type: directory
  register: claude_skill_dirs
  tags: [claude, skills]

- name: Ensure skill directories exist in ~/.claude/skills
  ansible.builtin.file:
    path: "{{ home_dir }}/.claude/skills/{{ item.path | basename }}"
    state: directory
    mode: "0755"
  loop: "{{ claude_skill_dirs.files }}"
  tags: [claude, skills]

- name: Find all skill files in repo
  ansible.builtin.find:
    paths: "{{ dotfiles_repo }}/configs/claude/skills"
    recurse: true
    file_type: file
  register: claude_skill_files
  tags: [claude, skills]

- name: Symlink Claude skill files
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ home_dir }}/.claude/skills/{{ item.path | relpath(dotfiles_repo + '/configs/claude/skills') }}"
    state: link
    force: true
  loop: "{{ claude_skill_files.files }}"
  tags: [claude, skills]
