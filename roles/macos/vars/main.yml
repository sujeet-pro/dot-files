---
# macOS system defaults
# Organized by category — each entry maps to a `defaults write` command.

# Screenshots
screenshot_location: "{{ home_dir }}/screen-captures"
screenshot_format: png
screenshot_disable_shadow: true

# Finder
finder_show_hidden_files: true
finder_search_scope: SCcf  # Search current folder by default
finder_disable_extension_warning: true

# Dock
dock_autohide: true
dock_tilesize: 36
dock_mineffect: scale
dock_show_recents: false
dock_autohide_delay: 0

# Keyboard
keyboard_key_repeat: 2          # Fast repeat (lower = faster)
keyboard_initial_repeat: 15     # Short delay before repeat starts
keyboard_disable_press_and_hold: true  # Disable accent popup, enable key repeat

# Trackpad
trackpad_scaling: 2.5

# Mission Control
missioncontrol_mru_spaces: false    # Don't rearrange Spaces based on recent use
missioncontrol_animation_duration: "0.1"

# Desktop Services — prevent .DS_Store on network and USB volumes
ds_store_disable_network: true
ds_store_disable_usb: true

# General UI
ui_expand_save_panel: true
ui_expand_print_panel: true
ui_save_to_disk: true           # Default save to disk (not iCloud)
ui_disable_quarantine: true     # Disable "Are you sure you want to open?" dialog

# Security
security_password_delay: 0  # Require password immediately after sleep/screensaver

# TextEdit
textedit_plain_text: true
textedit_encoding: 4  # UTF-8

# Activity Monitor
activitymonitor_dock_icon: 5   # Show CPU usage in Dock icon
activitymonitor_show_all: 0    # Show all processes

# Safari
safari_developer_menu: true

# Chrome
chrome_disable_swipe_navigation: true
