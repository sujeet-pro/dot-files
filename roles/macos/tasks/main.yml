---
# ---- Screenshots ----

- name: Create screenshot directory
  ansible.builtin.file:
    path: "{{ screenshot_location }}"
    state: directory
    mode: "0755"
  tags: [macos, defaults, screenshots]

- name: Set screenshot location
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ screenshot_location }}"
  tags: [macos, defaults, screenshots]

- name: Set screenshot format
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: type
    type: string
    value: "{{ screenshot_format }}"
  tags: [macos, defaults, screenshots]

- name: Disable screenshot shadow
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: disable-shadow
    type: bool
    value: "{{ screenshot_disable_shadow }}"
  tags: [macos, defaults, screenshots]

# ---- Finder ----

- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: "{{ finder_show_hidden_files }}"
  tags: [macos, defaults, finder]

- name: Set Finder search scope to current folder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: "{{ finder_search_scope }}"
  tags: [macos, defaults, finder]

- name: Disable file extension change warning
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXEnableExtensionChangeWarning
    type: bool
    value: "{{ not finder_disable_extension_warning }}"
  tags: [macos, defaults, finder]

# ---- Dock ----

- name: Enable Dock autohide
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: "{{ dock_autohide }}"
  tags: [macos, defaults, dock]

- name: Set Dock tile size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: "{{ dock_tilesize }}"
  tags: [macos, defaults, dock]

- name: Set Dock minimize effect
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mineffect
    type: string
    value: "{{ dock_mineffect }}"
  tags: [macos, defaults, dock]

- name: Hide recent apps in Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: "{{ dock_show_recents }}"
  tags: [macos, defaults, dock]

- name: Remove Dock autohide delay
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide-delay
    type: float
    value: "{{ dock_autohide_delay }}"
  tags: [macos, defaults, dock]

# ---- Keyboard ----

- name: Set fast key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: "{{ keyboard_key_repeat }}"
  tags: [macos, defaults, keyboard]

- name: Set short initial key repeat delay
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: "{{ keyboard_initial_repeat }}"
  tags: [macos, defaults, keyboard]

- name: Disable press-and-hold for key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: "{{ not keyboard_disable_press_and_hold }}"
  tags: [macos, defaults, keyboard]

# ---- Trackpad ----

- name: Set trackpad tracking speed
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.trackpad.scaling
    type: float
    value: "{{ trackpad_scaling }}"
  tags: [macos, defaults, trackpad]

# ---- Mission Control ----

- name: Disable auto-rearrange Spaces by recent use
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: "{{ missioncontrol_mru_spaces }}"
  tags: [macos, defaults, missioncontrol]

- name: Speed up Mission Control animation
  community.general.osx_defaults:
    domain: com.apple.dock
    key: expose-animation-duration
    type: float
    value: "{{ missioncontrol_animation_duration }}"
  tags: [macos, defaults, missioncontrol]

# ---- Desktop Services ----

- name: Disable .DS_Store on network volumes
  community.general.osx_defaults:
    domain: com.apple.desktopservices
    key: DSDontWriteNetworkStores
    type: bool
    value: "{{ ds_store_disable_network }}"
  tags: [macos, defaults, dsstore]

- name: Disable .DS_Store on USB volumes
  community.general.osx_defaults:
    domain: com.apple.desktopservices
    key: DSDontWriteUSBStores
    type: bool
    value: "{{ ds_store_disable_usb }}"
  tags: [macos, defaults, dsstore]

# ---- General UI ----

- name: Expand save panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSNavPanelExpandedStateForSaveMode
    type: bool
    value: "{{ ui_expand_save_panel }}"
  tags: [macos, defaults, ui]

- name: Expand save panel by default (2)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSNavPanelExpandedStateForSaveMode2
    type: bool
    value: "{{ ui_expand_save_panel }}"
  tags: [macos, defaults, ui]

- name: Expand print panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: PMPrintingExpandedStateForPrint
    type: bool
    value: "{{ ui_expand_print_panel }}"
  tags: [macos, defaults, ui]

- name: Expand print panel by default (2)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: PMPrintingExpandedStateForPrint2
    type: bool
    value: "{{ ui_expand_print_panel }}"
  tags: [macos, defaults, ui]

- name: Default save to disk (not iCloud)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSDocumentSaveNewDocumentsToCloud
    type: bool
    value: "{{ not ui_save_to_disk }}"
  tags: [macos, defaults, ui]

- name: Disable quarantine dialog for downloaded apps
  community.general.osx_defaults:
    domain: com.apple.LaunchServices
    key: LSQuarantine
    type: bool
    value: "{{ not ui_disable_quarantine }}"
  tags: [macos, defaults, ui]

# ---- Security ----

- name: Require password immediately after sleep
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: askForPasswordDelay
    type: int
    value: "{{ security_password_delay }}"
  tags: [macos, defaults, security]

# ---- TextEdit ----

- name: Use plain text mode in TextEdit
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: RichText
    type: int
    value: "{{ 0 if textedit_plain_text else 1 }}"
  tags: [macos, defaults, textedit]

- name: Set TextEdit encoding to UTF-8 (open)
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: PlainTextEncoding
    type: int
    value: "{{ textedit_encoding }}"
  tags: [macos, defaults, textedit]

- name: Set TextEdit encoding to UTF-8 (save)
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: PlainTextEncodingForWrite
    type: int
    value: "{{ textedit_encoding }}"
  tags: [macos, defaults, textedit]

# ---- Activity Monitor ----

- name: Show CPU usage in Activity Monitor Dock icon
  community.general.osx_defaults:
    domain: com.apple.ActivityMonitor
    key: IconType
    type: int
    value: "{{ activitymonitor_dock_icon }}"
  tags: [macos, defaults, activitymonitor]

- name: Show all processes in Activity Monitor
  community.general.osx_defaults:
    domain: com.apple.ActivityMonitor
    key: ShowCategory
    type: int
    value: "{{ activitymonitor_show_all }}"
  tags: [macos, defaults, activitymonitor]

# ---- Safari ----

- name: Enable Safari developer menu
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: IncludeDevelopMenu
    type: bool
    value: "{{ safari_developer_menu }}"
  ignore_errors: true  # Safari prefs are sandboxed; toggle manually via Safari > Settings > Advanced
  tags: [macos, defaults, safari]

# ---- Chrome ----

- name: Disable Chrome swipe navigation
  community.general.osx_defaults:
    domain: com.google.Chrome
    key: AppleEnableSwipeNavigateWithScrolls
    type: bool
    value: "{{ not chrome_disable_swipe_navigation }}"
  tags: [macos, defaults, chrome]

# ---- Apply changes ----

- name: Restart Dock to apply changes
  ansible.builtin.command: killall Dock
  changed_when: true
  failed_when: false
  tags: [macos, defaults]

- name: Restart Finder to apply changes
  ansible.builtin.command: killall Finder
  changed_when: true
  failed_when: false
  tags: [macos, defaults]

- name: Restart SystemUIServer to apply changes
  ansible.builtin.command: killall SystemUIServer
  changed_when: true
  failed_when: false
  tags: [macos, defaults]
