---
# --- VS Code ---

- name: Ensure VS Code settings directory exists
  ansible.builtin.file:
    path: "{{ vscode_settings_dir }}"
    state: directory
    mode: "0755"
  tags: [apps, vscode]

- name: Symlink VS Code settings.json
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/vscode/settings.json"
    dest: "{{ vscode_settings_dir }}/settings.json"
    state: link
    force: true
  tags: [apps, vscode]

- name: Install VS Code extensions
  ansible.builtin.command:
    cmd: "code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  register: vscode_ext_result
  changed_when: "'was successfully installed' in vscode_ext_result.stdout"
  failed_when: false
  tags: [apps, vscode, extensions]

# --- GitHub CLI ---

- name: Ensure .config/gh directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/gh"
    state: directory
    mode: "0755"
  tags: [apps, gh]

- name: Symlink GitHub CLI config
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/gh/config.yml"
    dest: "{{ home_dir }}/.config/gh/config.yml"
    state: link
    force: true
  tags: [apps, gh]

# --- Zed ---

- name: Ensure .config/zed directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/zed"
    state: directory
    mode: "0755"
  tags: [apps, zed]

- name: Symlink Zed settings
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/zed/settings.json"
    dest: "{{ home_dir }}/.config/zed/settings.json"
    state: link
    force: true
  tags: [apps, zed]

# --- cmux (Ghostty-based, reads ~/.config/ghostty/config) ---

- name: Ensure .config/ghostty directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/ghostty"
    state: directory
    mode: "0755"
  tags: [apps, cmux]

- name: Symlink Ghostty config (used by cmux)
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/ghostty/config"
    dest: "{{ home_dir }}/.config/ghostty/config"
    state: link
    force: true
  tags: [apps, cmux]

# --- btop ---

- name: Ensure .config/btop directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/btop"
    state: directory
    mode: "0755"
  tags: [apps, btop]

- name: Symlink btop config
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/configs/btop/btop.conf"
    dest: "{{ home_dir }}/.config/btop/btop.conf"
    state: link
    force: true
  tags: [apps, btop]
