---
# Homebrew CLI tools (formulae)
homebrew_formulae:
  # Core shell & prompt
  - zsh
  - zsh-autosuggestions
  - zsh-completions
  - zsh-syntax-highlighting
  - starship
  - fzf
  - git

  # Modern CLI replacements
  - bat
  - eza
  - ripgrep
  - tlrc
  - zoxide

  # Dev tools
  - btop
  - difftastic
  - gh
  - git-delta
  - hurl
  - jq
  - lazygit
  - shellcheck
  - yq

  # Infra & automation
  - ansible
  - mise

  # Container tools
  - colima
  - docker
  - docker-buildx
  - docker-compose

  # Cloud & infra
  - awscli
  - helm
  - kubernetes-cli

  # Shell history
  - atuin

# Formulae to remove as part of migration/cleanup
homebrew_formulae_absent:
  - go         # managed by mise if needed
  - uv         # managed by mise, not brew
  - direnv     # mise handles env vars natively
  - tree       # aliased via eza --tree
  - fd         # fzf works without it
  - aichat     # using claude CLI instead
  - gemini-cli # using claude CLI instead

# Homebrew GUI applications (casks)
homebrew_casks:
  # Editors & IDEs
  - cursor
  - visual-studio-code
  - intellij-idea
  - webstorm
  - pycharm
  - datagrip
  - zed
  - antigravity

  # AI Tools
  - claude
  - claude-code
  - cursor-cli

  # API clients
  - bruno

  # Terminal
  - ghostty
  - cmux

  # Browsers
  - firefox
  - google-chrome

  # Communication
  - slack
  - zoom

  # Utilities
  - logi-options+
  - notion
  - raycast

  # Fonts
  - font-jetbrains-mono-nerd-font

# Casks to remove as part of migration/cleanup
homebrew_casks_absent:
  - httpie-desktop
  - wave            # using ghostty + cmux
  - font-jetbrains-mono  # nerd font variant covers this
